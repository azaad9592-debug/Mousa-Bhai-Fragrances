<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order | Musa Bhai Fragrances</title>
    <meta name="description" content="Securely place your order for premium fragrances with Musa Bhai.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0A0A0A;
            --dark-grey: #111;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        .order-page-wrapper {
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(212,175,55,0.05), transparent),
                        radial-gradient(circle at bottom left, rgba(212,175,55,0.05), transparent);
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .order-container {
            width: 100%;
            max-width: 700px;
            background: rgba(17, 17, 17, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: clamp(30px, 5vw, 60px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .order-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .order-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .order-header p {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212,175,55,0.15);
        }

        .payment-info {
            background: rgba(212,175,55,0.05);
            border: 1px dashed rgba(212,175,55,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .payment-info h3 {
            color: var(--gold);
            margin-top: 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .payment-info p {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }

        .submit-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(90deg, #D4AF37, #F1D57F, #B8860B);
            border: none;
            border-radius: 12px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212,175,55,0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .back-link {
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-link:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="order-page-wrapper">
        <div class="order-container">
            <div class="order-header">
                <h1>Official Order Form</h1>
                <p>Complete the details below to finalize your order.</p>
            </div>

            <div class="payment-info">
                <h3>Payment Details</h3>
                <p><strong>EasyPaisa:</strong> 0310 1131981</p>
                <p><strong>Account Name:</strong> Mousa</p>
                <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.7;">Please send the amount and enter the Transaction ID below.</p>
            </div>

            <form id="perfumeOrderForm">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" placeholder="Enter your complete name" required>
                </div>

                <div class="form-group">
                    <label for="whatsapp">WhatsApp Number</label>
                    <input type="tel" id="whatsapp" placeholder="e.g. 0300 1234567" required>
                </div>

                <div class="form-group">
                    <label for="perfume-details">Perfume Name & Quantity</label>
                    <textarea id="perfume-details" rows="3" placeholder="e.g. Sauvage Elixir (50ml) - 2 bottles" required></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="amount">Total Amount (PKR)</label>
                        <input type="number" id="amount" placeholder="Enter total price" required>
                    </div>
                    <div class="form-group">
                        <label for="payment-method">Payment Method</label>
                        <select id="payment-method" required>
                            <option value="" disabled selected>Select Method</option>
                            <option value="EasyPaisa">EasyPaisa</option>
                            <option value="Bank Transfer">Bank Transfer</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="transaction-id">Transaction ID / Account No</label>
                    <input type="text" id="transaction-id" placeholder="Enter payment proof details" required>
                </div>

                <button type="submit" class="submit-btn">Send Order via WhatsApp</button>
            </form>

            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Boutique</a>
        </div>
    </div>

    <script>
        document.getElementById('perfumeOrderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('full-name').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const details = document.getElementById('perfume-details').value;
            const amount = document.getElementById('amount').value;
            const method = document.getElementById('payment-method').value;
            const tid = document.getElementById('transaction-id').value;

            const message = `*Musa Bhai Fragrances - New Order*%0A%0A` +
                            `*Customer Name:* ${name}%0A` +
                            `*WhatsApp:* ${whatsapp}%0A` +
                            `*Perfume Details:* ${details}%0A` +
                            `*Total Amount:* PKR ${amount}%0A` +
                            `*Payment Method:* ${method}%0A` +
                            `*Transaction ID:* ${tid}%0A%0A` +
                            `_Please confirm my order. Thank you!_`;

            const waLink = `https://wa.me/923101131981?text=${message}`;
            window.open(waLink, '_blank');
        });
    </script>
</body>
</html>
