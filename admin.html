<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musa Bhai | Enterprise Admin Portal</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #0A0A0A;
            --dark-grey: #1c1c1c;
            --gold: #D4AF37;
            --off-white: #fdfdfd;
            --success: #28a745;
            --pending: #ffc107;
            --grad-luxury: linear-gradient(135deg, #111 0%, #1c1c1c 100%);
            --grad-gold: linear-gradient(90deg, #D4AF37, #f4d03f);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); color: var(--off-white); font-family: 'Poppins', sans-serif; overflow-x: hidden; }

        /* Login Layout */
        #login-section { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #222 0%, #000 100%); }
        .login-card { background: var(--dark-grey); padding: 50px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }

        /* Dashboard Header */
        .admin-header { background: var(--dark-grey); padding: 25px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.1); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto; padding: 0 25px; }

        /* Tabs */
        .tab-nav { display: flex; gap: 15px; margin-bottom: 40px; }
        .tab-btn { background: #222; border: 1px solid rgba(255,255,255,0.05); color: #fff; padding: 12px 25px; border-radius: 12px; cursor: pointer; transition: var(--transition); font-weight: 600; font-size: 14px; }
        .tab-btn.active { background: var(--gold); color: black; border-color: var(--gold); }

        /* Counters Bar */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--grad-luxury); padding: 30px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); text-align: center; position: relative; overflow: hidden; }
        .stat-card i { font-size: 2rem; color: var(--gold); opacity: 0.2; position: absolute; right: 20px; bottom: 20px; }
        .stat-card h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-bottom: 10px; }
        .stat-card .val { font-size: 2.5rem; font-weight: 700; font-family: 'Playfair Display', serif; }

        /* Search & Filter */
        .filter-bar { display: flex; gap: 20px; margin-bottom: 30px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .search-input { flex: 1; background: #000; border: 1px solid rgba(212, 175, 55, 0.3); padding: 12px 20px; border-radius: 10px; color: white; outline: none; }
        .search-input:focus { border-color: var(--gold); }

        /* Orders Table / List */
        .orders-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .order-row { background: var(--dark-grey); border-radius: 18px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.05); display: grid; grid-template-columns: auto 1fr 1fr 1fr auto; gap: 30px; align-items: center; position: relative; transition: var(--transition); }
        .order-row:hover { transform: scale(1.01); border-color: var(--gold); background: #222; }
        .order-row.new-order { border-left: 4px solid var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.2); } 70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }

        .client-info h4 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .client-info p { font-size: 13px; opacity: 0.6; }

        .prod-info { text-align: center; }
        .prod-info .badge { background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 4px 12px; border-radius: 5px; font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 5px; }

        .status-pill { padding: 8px 18px; border-radius: 50px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: none; }
        .status-Pending { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid rgba(255,193,7,0.2); }
        .status-Processed { background: rgba(40, 167, 69, 0.1); color: #28a745; border: 1px solid rgba(40,167,69,0.2); }

        /* Inventory Manager */
        .inventory-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .inv-card { background: var(--dark-grey); padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.1); text-align: center; }
        .inv-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }

        /* Responsiveness */
        @media (max-width: 1100px) {
            .order-row { grid-template-columns: 1fr 1fr; gap: 20px; }
            .order-row > div:last-child { grid-column: span 2; }
        }
        @media (max-width: 600px) {
            .order-row { grid-template-columns: 1fr; }
            .order-row > div:last-child { grid-column: span 1; }
            .filter-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Login UI -->
    <section id="login-screen">
        <div class="login-card">
            <h1 style="font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 10px;">Musa Bhai</h1>
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase;">Secure Admin Gateway</p>
            <input type="password" id="admin-pass" class="search-input" placeholder="Enter Access Code" style="text-align: center; margin-bottom: 20px; width: 100%;">
            <button onclick="attemptLogin()" class="status-pill status-Processed" style="width: 100%; border-radius: 12px; padding: 15px;">Authenticate Access</button>
        </div>
    </section>

    <!-- Admin Portal UI -->
    <main id="admin-portal" style="display: none;">
        
        <header class="admin-header">
            <div class="header-flex">
                <div class="brand">
                    <span style="color: var(--gold); font-weight: 800; font-size: 1.5rem; letter-spacing: 1px;">ADMIN</span>
                    <span style="opacity: 0.4; font-size: 12px; margin-left: 10px;">DASHBOARD V2.0</span>
                </div>
                <button onclick="logout()" style="background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: 600;">Sign Out</button>
            </div>
        </header>

        <div class="container" style="max-width: 1300px; margin: 50px auto; padding: 0 25px;">
            
            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('orders', this)">Live Orders</button>
                <button class="tab-btn" onclick="switchTab('inventory', this)">Inventory CMS</button>
                <button class="tab-btn" onclick="switchTab('stats', this)">Sales Analytics</button>
            </div>

            <!-- Dashboard Content -->
            <div id="content-orders" class="tab-pane">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div id="count-total" class="val">0</div>
                        <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                    <div class="stat-card">
                        <h3>WhatsApp Inbound</h3>
                        <div id="count-wa" class="val">0</div>
                        <i class="fa-brands fa-whatsapp"></i>
                    </div>
                    <div class="stat-card">
                        <h3>Email Inbound</h3>
                        <div id="count-email" class="val">0</div>
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <div class="stat-card">
                        <h3>Processed</h3>
                        <div id="count-processed" class="val">0</div>
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                </div>

                <div class="filter-bar">
                    <input type="text" id="order-search" class="search-input" placeholder="Search by Customer name, Product or ID..." onkeyup="filterOrders()">
                    <select id="status-filter" class="search-input" style="flex: 0 0 200px;" onchange="filterOrders()">
                        <option value="">All Statuses</option>
                        <option value="Pending">Pending Only</option>
                        <option value="Processed">Processed Only</option>
                    </select>
                </div>

                <div id="orders-list" class="orders-grid">
                    <!-- Orders Injected Here -->
                </div>
            </div>

            <!-- Inventory Panel -->
            <div id="content-inventory" class="tab-pane" style="display: none;">
                <div style="background: #1a1a1a; padding: 40px; border-radius: 15px; margin-bottom: 50px; border: 1px dashed var(--gold);">
                    <h2 style="margin-bottom: 25px;">+ Add New Product</h2>
                    <form onsubmit="addProduct(event)" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                        <input type="text" id="p-name" class="search-input" placeholder="Product Name" required>
                        <input type="text" id="p-price" class="search-input" placeholder="Price (Numbers)" required>
                        <input type="text" id="p-img" class="search-input" placeholder="Image URL" required>
                        <button type="submit" class="status-pill status-Processed" style="height: 48px; border-radius: 10px;">Save Product</button>
                    </form>
                </div>
                <div id="inv-grid" class="inventory-list">
                    <!-- Products Injected Here -->
                </div>
            </div>

        </div>
    </main>

    <script>
        const AUTH_KEY = "musa_admin_session";
        const STORAGE_KEY = "orders";
        const PRODUCTS_KEY = "musa_products";

        // Auth Logic
        function attemptLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === "12345") {
                sessionStorage.setItem(AUTH_KEY, "true");
                showPortal();
            } else {
                alert("Invalid Access Code");
            }
        }

        function logout() {
            sessionStorage.removeItem(AUTH_KEY);
            window.location.reload();
        }

        window.onload = () => {
            if (sessionStorage.getItem(AUTH_KEY) === "true") showPortal();
        };

        function showPortal() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-portal').style.display = 'block';
            syncDashboard();
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + tab).style.display = 'block';
            btn.classList.add('active');
            if (tab === 'inventory') syncInventory();
            if (tab === 'orders') syncDashboard();
        }

        // Search & Filter
        function filterOrders() {
            const query = document.getElementById('order-search').value.toLowerCase();
            const status = document.getElementById('status-filter').value;
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            
            const filtered = orders.filter(o => {
                const matchSearch = o.name.toLowerCase().includes(query) || o.product.toLowerCase().includes(query) || o.id.toString().includes(query);
                const matchStatus = status === "" || (o.status || 'Pending') === status;
                return matchSearch && matchStatus;
            });
            
            renderOrders(filtered);
        }

        // Data Sync
        function syncDashboard() {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            renderOrders(orders);
            
            // Statistics
            document.getElementById('count-total').innerText = orders.length;
            document.getElementById('count-processed').innerText = orders.filter(o => o.status === 'Processed').length;
            
            // Notification Counters
            document.getElementById('count-wa').innerText = localStorage.getItem('wa_trigger_count') || orders.length;
            document.getElementById('count-email').innerText = localStorage.getItem('email_trigger_count') || orders.length;
        }

        function renderOrders(data) {
            const list = document.getElementById('orders-list');
            if (data.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:100px; opacity:0.3;">NO ORDERS FOUND</div>';
                return;
            }

            // Show latest first
            const sorted = [...data].reverse();
            const oneHourAgo = Date.now() - (60 * 60 * 1000);

            list.innerHTML = sorted.map(o => `
                <div class="order-row ${o.id > oneHourAgo ? 'new-order' : ''}">
                    <div style="font-size:10px; opacity:0.4; font-weight:700;">#${o.id.toString().slice(-6)}</div>
                    
                    <div class="client-info">
                        <h4>${o.name}</h4>
                        <p>${o.phone}</p>
                        <p style="color:var(--gold)">${o.email}</p>
                    </div>

                    <div class="prod-info">
                        <span class="badge">${o.product}</span>
                        <div style="font-weight:700;">Rs. ${o.total}</div>
                        <div style="font-size:11px; opacity:0.5;">Qty: ${o.quantity}</div>
                    </div>

                    <div style="font-size:12px; opacity:0.7; max-width:250px;">
                        <i class="fa-solid fa-location-dot" style="color:var(--gold); margin-right:5px;"></i>
                        ${o.address}
                        <br><small style="opacity:0.5;">${o.date}</small>
                    </div>

                    <div>
                        <button onclick="toggleStatus(${o.id})" class="status-pill status-${o.status || 'Pending'}">
                            ${o.status || 'Pending'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleStatus(id) {
            let orders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            orders = orders.map(o => {
                if (o.id == id) {
                    const newStatus = o.status === 'Processed' ? 'Pending' : 'Processed';
                    return { ...o, status: newStatus };
                }
                return o;
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            syncDashboard();
        }

        // Inventory Logic
        function syncInventory() {
            const products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = products.map((p, idx) => `
                <div class="inv-card">
                    <img src="${p.image}" alt="">
                    <h4>${p.name}</h4>
                    <p style="color:var(--gold); font-weight:700; margin:10px 0;">Rs. ${p.price}</p>
                    <button onclick="deleteProduct(${idx})" style="background:transparent; border:1px solid #dc3545; color:#dc3545; padding:5px 15px; border-radius:5px; cursor:pointer; font-size:11px;">Remove</button>
                </div>
            `).join('');
        }

        function addProduct(e) {
            e.preventDefault();
            const p = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                image: document.getElementById('p-img').value,
                category: "Premium Fragrance"
            };
            const products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
            products.push(p);
            localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
            alert("Product Synchronized Successfully");
            syncInventory();
            e.target.reset();
        }

        function deleteProduct(idx) {
            if (!confirm("Confirm Deletion?")) return;
            const products = JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
            products.splice(idx, 1);
            localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
            syncInventory();
        }

        // Auto-refresh every 30 seconds for "Live" feel
        setInterval(() => {
            if (sessionStorage.getItem(AUTH_KEY) === "true") syncDashboard();
        }, 30000);
    </script>
</body>
</html>
